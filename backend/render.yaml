services:
  - type: web
      name: gokul-shree-api
          runtime: node
              region: oregon
                  plan: free
                      buildCommand: npm install
                          startCommand: npm start
                              envVars:
                                    - key: NODE_ENV
                                            value: production
                                                  - key: JWT_SECRET
                                                          generateValue: true
                                                                - key: JWT_EXPIRES_IN
                                                                        value: 7d
                                                                              - key: API_VERSION
                                                                                      value: v1
                                                                                            - key: SUPABASE_URL
                                                                                                    sync: false
                                                                                                          - key: SUPABASE_ANON_KEY
                                                                                                                  sync: false
                                                                                                                        - key: SUPABASE_SERVICE_KEY
                                                                                                                                sync: false
                                                                                                                                
